# PERPETUA external enforcement (§18.3). Independent of any agent session:
# CI fails a ratchet → merge blocked, regardless of what a session believes.
# Some gates (coverage, mutation, OSV) are PENDING until B-005/B-006 wire the
# tooling; they are marked clearly rather than faked green.
name: perpetua-gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'perpetua/**']

permissions:
  contents: read

jobs:
  build-test-ratchet:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexuspay
          POSTGRES_PASSWORD: nexuspay_local
          POSTGRES_DB: nexuspay
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nexuspay -d nexuspay"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build + test + coverage
        run: ./gradlew build test jacocoTestReport --no-daemon
        env:
          NEXUSPAY_DB_URL: jdbc:postgresql://localhost:5432/nexuspay
          NEXUSPAY_DB_USER: nexuspay
          NEXUSPAY_DB_PASSWORD: nexuspay_local

      - name: Ratchet — aggregate line coverage must not drop below floor
        run: |
          floor=$(grep -oE '"coverage_floor_pct"[[:space:]]*:[[:space:]]*[0-9]+' .perpetua/ratchets.json | grep -oE '[0-9]+$')
          cov=0; mis=0
          while read -r f; do
            line=$(grep -oE '<counter type="LINE"[^/]*/>' "$f" | tail -1)
            c=$(echo "$line" | grep -oE 'covered="[0-9]+"' | grep -oE '[0-9]+'); m=$(echo "$line" | grep -oE 'missed="[0-9]+"' | grep -oE '[0-9]+')
            cov=$(( cov + ${c:-0} )); mis=$(( mis + ${m:-0} ))
          done < <(find . -path '*/build/reports/jacoco/test/jacocoTestReport.xml')
          total=$(( cov + mis )); pct=0; [ "$total" -gt 0 ] && pct=$(( cov * 100 / total ))
          echo "aggregate line coverage: ${pct}% (${cov}/${total})   floor: ${floor}%"
          if [ "$pct" -lt "$floor" ]; then
            echo "::error::Coverage ${pct}% is below ratchet floor ${floor}%"; exit 1
          fi

      - name: Ratchet — unit test count must not drop below floor
        run: |
          floor=$(grep -oE '"test_count_floor"[[:space:]]*:[[:space:]]*[0-9]+' .perpetua/ratchets.json | grep -oE '[0-9]+$')
          total=0
          while read -r f; do
            t=$(grep -oE 'tests="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            s=$(grep -oE 'skipped="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+')
            total=$(( total + ${t:-0} - ${s:-0} ))
          done < <(find . -path '*/build/test-results/test/*.xml')
          echo "executed unit tests: $total   floor: $floor"
          if [ "$total" -lt "$floor" ]; then
            echo "::error::Test count $total is below ratchet floor $floor"; exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perpetua-test-results
          path: '**/build/reports/tests/'

  # Secret scan via the gitleaks BINARY (pinned), not the marketplace action: the
  # action posts PR comments and 403'd with "Resource not accessible by
  # integration" under the default read-only token. The binary needs no PR API.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks (pinned binary)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks version
          # Scan the working tree; fail on any finding. .gitleaks.toml allowlists the
          # single intentional false positive (B-004 default-secret detection literals).
          /tmp/gitleaks detect --source . --config .gitleaks.toml --no-git --redact --no-banner --exit-code 1

  # Dependency/OSV vulnerability scan (B-006) via the pinned osv-scanner BINARY
  # (the google/osv-scanner-action@v1 ref does not resolve). First run is
  # REPORT-ONLY (§15.3): findings are triaged into security/AUDITS.md + BACKLOG,
  # then enforcement (ratchets high_vulns_max=0) is turned on in a follow-up.
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OSV-Scanner (pinned binary, report-only)
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64 -o /tmp/osv-scanner
          chmod +x /tmp/osv-scanner
          /tmp/osv-scanner --version
          /tmp/osv-scanner scan source --recursive ./ || echo "::warning::OSV findings above are report-only (B-006 triage pending); not blocking yet"

  # SAST (B-006) via the PINNED semgrep image — not the floating marketplace
  # action, matching the gitleaks/osv "pinned binary, no marketplace action"
  # convention. The image is a Linux container so semgrep-core runs cleanly
  # (the OCaml RPC needs Unix socketpair, which is unavailable on native
  # Windows but fine here). First run is REPORT-ONLY (§15.3): the `|| echo
  # ::warning` swallows semgrep's non-zero exit so findings can be triaged into
  # security/AUDITS.md before the gate is flipped (mirrors dependency-scan).
  # Rulesets: p/java (core Java SAST), p/owasp-top-ten (injection/SSRF/XXE),
  # p/secrets (defense-in-depth vs gitleaks). Excludes: build/ + every module's
  # build/ (jacoco + generated avro classes), generated sources, all test trees,
  # gatling, and checkout-sdk (Node/TS, out of Java SAST scope).
  sast-scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.166.0  # pin the tag; TODO(B-012) also pin @sha256 digest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep Java SAST (pinned image, report-only)
        run: |
          # Pre-create the SARIF so the upload step never fails on a missing file even if
          # semgrep crashes before writing (registry/rule-fetch failure, core error). The
          # `|| echo` below only swallows the SCAN step's exit, not the separate upload step.
          : > semgrep.sarif
          semgrep --version
          semgrep scan \
            --config p/java --config p/owasp-top-ten --config p/secrets \
            --metrics off \
            --include '*.java' \
            --exclude build --exclude '**/build/**' \
            --exclude '**/generated/**' --exclude '**/test/**' \
            --exclude gatling --exclude checkout-sdk \
            --error \
            --sarif --output semgrep.sarif . \
            || echo "::warning::Semgrep findings above are report-only (B-006 triage pending); not blocking yet"
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn

  # PENDING gates (enable as the tooling lands; do not fake-pass):
  #  - scoped mutation on changed modules         -> B-005 (PIT)
  #  - SAST gate flip (report-only -> blocking)   -> B-006: once the first CI run
  #      is triaged clean, add a semgrep ratchet. DO NOT just drop the `|| echo`:
  #      it swallows ANY non-zero exit, so a BROKEN scan (registry unreachable, 0
  #      rules loaded, all files unparsed) exits non-zero and is swallowed too —
  #      green-but-scanned-nothing. semgrep exit codes are 0=clean / 1=findings /
  #      >=2=error; the flip must distinguish them (e.g. `|| { rc=$?; [ "$rc" = 1 ]
  #      && exit 1 || exit $rc; }`, i.e. fail the build on real findings AND on a
  #      broken scan, never on neither). Java surface is already 0-finding under
  #      p/java+owasp+secrets, so it can gate at high/error severity once the
  #      runner confirms the scan actually executed (non-zero file/rule count).
  #  - benchmark smoke vs ratchets.benchmarks     -> ROADMAP Later (JMH)
  # TODO(B-012): pin all third-party actions by commit SHA.
