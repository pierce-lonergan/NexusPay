name: CI

on:
  # Run build+test on main, on PRs to main, AND on perpetua/** branch pushes. The last one is a
  # guardrail (L-038): before this, branch pushes only ran build+test while a PR to main was OPEN
  # (the pull_request trigger). Merging that PR silently stopped branch build+test, so dormant work
  # pushed afterward was verified only by perpetua-gates (changelog/secrets/ratchet), never compiled
  # or IT-run. Building on perpetua/** pushes too closes that gap.
  push:
    branches: [main, 'perpetua/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexuspay
          POSTGRES_PASSWORD: nexuspay_local
          POSTGRES_DB: nexuspay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexuspay -d nexuspay"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          NEXUSPAY_DB_URL: jdbc:postgresql://localhost:5432/nexuspay
          NEXUSPAY_DB_USER: nexuspay
          NEXUSPAY_DB_PASSWORD: nexuspay_local

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
