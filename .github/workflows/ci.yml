name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexuspay
          POSTGRES_PASSWORD: nexuspay_local
          POSTGRES_DB: nexuspay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexuspay -d nexuspay"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          NEXUSPAY_DB_URL: jdbc:postgresql://localhost:5432/nexuspay
          NEXUSPAY_DB_USER: nexuspay
          NEXUSPAY_DB_PASSWORD: nexuspay_local

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
