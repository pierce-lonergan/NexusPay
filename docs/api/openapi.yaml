openapi: 3.1.0
info:
  title: NexusPay API
  version: v1
  description: >-
    Curated OpenAPI for the merchant integration surface (payments, refunds,
    payment sessions, webhook endpoints/deliveries, API keys).


    This document is hand-maintained for readability and TypeScript codegen. The
    live `GET /v1/api-docs` (springdoc) is the complete authoritative spec —
    snapshot it with `curl localhost:8090/v1/api-docs -o openapi.json` and
    generate types with `openapi-typescript`.


    Conventions:
      - All monetary amounts are **integers in minor units** (e.g. cents: 5000 = $50.00).
      - Timestamps are ISO-8601 (`Instant`) EXCEPT the webhook envelope `created`
        field, which is **epoch seconds** (see `WebhookEvent`).
      - Response wire keys are **snake_case** for every DTO EXCEPT the SDK
        `ConfirmResponse` (camelCase, pinned `@JsonProperty`), which is the
        `/v1/checkout/confirm` body consumed by `@nexus-pay/js` and is not part of
        this merchant-server surface.
      - `mode` / `livemode` are SERVER-DERIVED from the authenticated key's
        `is_live` flag (test for `sk_test_`), never read from the request body.

servers:
  - url: http://localhost:8090
    description: Local dev (lite stack)

tags:
  - name: Payments
    description: Payment lifecycle operations
  - name: Payment Sessions
    description: Manage checkout SDK payment sessions
  - name: Refunds
    description: Refund creation (201 created, or 202 maker-checker approval)
  - name: Webhook Endpoints
    description: Manage merchant webhook URLs and inspect deliveries
  - name: API Keys
    description: Manage API keys
  - name: Disputes
    description: Read disputes (chargebacks) and their event timeline; simulate a dispute in test mode
  - name: Customers
    description: Manage customers (the anchor of the saved-credential cluster); tenant-scoped, soft-deletable
  - name: Payment Methods
    description: >-
      Manage saved, multi-use payment methods attached to a customer; tenant-scoped, soft-deletable
      (detach). PCI-safe — never accepts or stores a raw PAN.
  - name: Mandates
    description: >-
      Record off-session consent (mandates) of the saved-credential cluster; tenant-scoped. A cited
      mandate is a validated consent gate on the off-session charge. Revoke deactivates (not a soft delete).
  - name: Test Helpers
    description: Test-mode-only control endpoints (reachable ONLY with an sk_test_ key)

paths:
  /v1/payment-sessions:
    post:
      tags: [Payment Sessions]
      summary: Create a payment session for the checkout SDK
      description: >-
        Roles: admin, operator. The returned `client_secret` is the session JWT
        the browser SDK loads; it is present ONLY on this create response (never
        on GET). The session inherits the API key's server-derived mode.
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/payment-sessions/{id}:
    get:
      tags: [Payment Sessions]
      summary: Retrieve a payment session
      description: 'Roles: admin, operator, viewer. `client_secret` is NOT returned here.'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/payment-sessions/{id}/expire:
    post:
      tags: [Payment Sessions]
      summary: Force-expire a payment session
      description: 'Roles: admin, operator.'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Session expired (no content)

  /v1/payments:
    get:
      tags: [Payments]
      summary: List payments (read-model projection)
      description: >-
        Roles: admin, operator, viewer. Scope: `payments:read`. Lists the
        AUTHENTICATED tenant's payments from the durable READ-MODEL projection
        (GAP-076) — never another tenant's (the tenant is derived from the key,
        never an `X-Tenant-Id` header). Results are additionally scoped to the
        key's mode: a test key (`sk_test_`) lists ONLY test payments and a live
        key ONLY live payments. Optionally filter by `status` and/or
        `customer_id`. `limit` is clamped to [1,100] server-side.


        FORWARD-FILL CAVEAT (read-model semantics): this list enumerates only
        payments CREATED AFTER the read-model shipped — older payments are absent
        from the list but `GET /v1/payments/{id}` still serves them (it reads the
        PSP/mock directly, unchanged). It is NOT data loss. The list may also LAG
        a live async settlement by the webhook-delivery window: a live payment
        shows `processing` until the HyperSwitch webhook lands and advances it to
        `succeeded` (the `{id}` endpoint is always current). The projection is a
        best-effort, read-only denormalization — never a source of truth.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: >-
            Optional status filter (e.g. `succeeded`, `failed`,
            `requires_action`, `processing`, `requires_capture`).
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
          description: Optional customer id filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size; clamped to [1,100] server-side.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The caller tenant's payments (in the caller key's mode)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Payments]
      summary: Create a payment intent
      description: >-
        Roles: admin, operator. Returns **201 Created**. The response `mode`
        ("test"/"live") is server-derived from the authenticated key, and
        `livemode` (boolean) mirrors it (`mode == "live"`), matching the webhook
        envelope's `livemode`. The optional `Idempotency-Key` header makes the
        create safely retryable. NOTE (critique 5.1): this create response
        carries only the payment `id` (no `client_secret`); a browser
        `client_secret` comes from `POST /v1/payment-sessions`
        (`PaymentSessionResponse`).


        TEST-3d off-session: when the body cites a saved `payment_method` (`pm_*`)
        and/or a `mandate_id`, both are resolved TENANT-SCOPED with no existence
        oracle. A foreign/missing `payment_method` or a foreign/missing cited
        `mandate_id` returns **404** from THIS create call (not 422). A non-ACTIVE
        cited mandate returns **400** `invalid_mandate`; a mandate authorizing a
        different `payment_method` returns **400** `mandate_payment_method_mismatch`.
        The gateway is never reached on any of these, so no money moves.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/PaymentError'

  /v1/payments/{id}:
    get:
      tags: [Payments]
      summary: Retrieve a payment
      description: 'Roles: admin, operator, viewer. 404 on cross-tenant or absent id (no existence oracle).'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/payments/{id}/confirm:
    post:
      tags: [Payments]
      summary: Confirm a payment intent
      description: 'Roles: admin, operator. Tenant-ownership checked before the id reaches the PSP.'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentRequest'
      responses:
        '200':
          description: Payment after confirm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/payments/{id}/capture:
    post:
      tags: [Payments]
      summary: Capture an authorized payment
      description: 'Roles: admin, operator. Body `amount_to_capture` is optional (omit to capture full amount).'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapturePaymentRequest'
      responses:
        '200':
          description: Payment after capture
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/payments/{id}/cancel:
    post:
      tags: [Payments]
      summary: Void a payment authorization
      description: 'Roles: admin, operator. Body `cancellation_reason` is optional.'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelPaymentRequest'
      responses:
        '200':
          description: Payment after cancel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/payments/{id}/refunds:
    post:
      tags: [Refunds]
      summary: Create a refund
      description: >-
        Roles: admin, operator. Returns **201** with a `RefundApiResponse`
        (`requires_approval: false`) when the amount is within the auto-approve
        threshold, OR **202** with an `ApprovalResponse`
        (`requires_approval: true`, plus `approval_threshold`) when it exceeds
        the maker-checker threshold and must be reviewed. Both are 2xx — narrow
        on `requires_approval`.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '201':
          description: Refund created (did not require approval)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundApiResponse'
        '202':
          description: Refund requires maker-checker approval (pending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/refunds:
    get:
      tags: [Refunds]
      summary: List refunds (read-model projection)
      description: >-
        Roles: admin, operator, viewer. Scope: `refunds:read`. Lists the
        AUTHENTICATED tenant's refunds from the durable READ-MODEL projection
        (GAP-076) — never another tenant's (the tenant is derived from the key,
        never an `X-Tenant-Id` header). Results are additionally scoped to the
        key's mode (a test key lists only test refunds, a live key only live).
        Optionally filter by `payment` (parent payment id) and/or `status`.
        `limit` is clamped to [1,100] server-side.


        FORWARD-FILL CAVEAT (read-model semantics): enumerates only refunds
        CREATED AFTER the read-model shipped; older refunds are absent from the
        list but `GET /v1/refunds/{id}` still serves them (it reads the PSP/mock
        directly). The list may also LAG a live async settlement by the
        webhook-delivery window (a refund shows `pending` until the
        `refund_succeeded` webhook advances it). The projection is best-effort,
        read-only — never a source of truth.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: payment
          in: query
          required: false
          schema:
            type: string
          description: Optional parent payment id filter.
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Optional status filter (`pending`, `succeeded`, `failed`).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size; clamped to [1,100] server-side.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The caller tenant's refunds (in the caller key's mode)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RefundApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/refunds/{id}:
    get:
      tags: [Refunds]
      summary: Retrieve a refund by id
      description: >-
        Roles: admin, operator, viewer. Scope: `refunds:read`. Reads the refund
        directly from the PSP/mock (unaffected by the read-model forward-fill).
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The refund
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/webhook-endpoints:
    post:
      tags: [Webhook Endpoints]
      summary: Register a webhook endpoint
      description: >-
        Role: admin. The `url` must be public HTTPS (SEC-4b SSRF gate rejects
        loopback/private/metadata hosts at registration). The signing `secret`
        (`whsec_…`) is returned ONCE here and never again.
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookEndpointRequest'
      responses:
        '201':
          description: Endpoint registered (secret included)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Webhook Endpoints]
      summary: List registered webhook endpoints
      description: 'Roles: admin, operator. Enabled endpoints for the caller''s tenant; `secret` is omitted.'
      security:
        - apiKey: []
        - bearerAuth: []
      responses:
        '200':
          description: Endpoints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookEndpointResponse'

  /v1/webhook-endpoints/{id}:
    delete:
      tags: [Webhook Endpoints]
      summary: Delete (soft-disable) a webhook endpoint
      description: >-
        Role: admin. Soft-disables the endpoint. A cross-tenant or absent id
        no-ops to 204 (no existence oracle).
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Endpoint disabled (no content)

  /v1/webhook-endpoints/{id}/rotate-secret:
    post:
      tags: [Webhook Endpoints]
      summary: Rotate a webhook endpoint's signing secret
      description: >-
        Role: admin. Returns the NEW `secret` once. The next delivery attempt
        signs with the new secret automatically (read live per attempt). A
        foreign/absent id returns 404.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Secret rotated (new secret included)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/webhook-deliveries:
    get:
      tags: [Webhook Endpoints]
      summary: List outbound webhook delivery attempts
      description: >-
        Roles: admin, operator. Tenant-scoped, paged (default size 50),
        optionally filtered by `endpointId` and/or `eventId`. The delivery DTO
        carries no body and no secret by construction.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: endpointId
          in: query
          required: false
          schema:
            type: string
        - name: eventId
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
      responses:
        '200':
          description: Paged delivery records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryPage'

  /v1/webhook-deliveries/{id}/replay:
    post:
      tags: [Webhook Endpoints]
      summary: Replay a webhook delivery
      description: >-
        Role: admin. Re-arms an existing delivery row (status → FAILED,
        next_attempt_at → now) so the retrier re-sends it once. The ONLY way a
        DELIVERED/DEAD row is re-sent. A foreign/absent id returns 404.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '202':
          description: Delivery re-armed for replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/webhook-deliveries/{id}/body:
    get:
      tags: [Webhook Endpoints]
      summary: Get the exact delivered body of a webhook delivery you own
      description: >-
        Roles: admin, operator. Scope: `webhooks:read`. Returns the EXACT
        `canonical_body` that was delivered + signed for one of YOUR OWN
        deliveries, so you can debug signature verification against the precise
        payload. Tenant-scoped: a foreign/absent delivery id returns `404` (no
        existence oracle). The signing secret is never a field on this response.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The delivered body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveryBodyResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/webhook-deliveries/{id}/signature:
    get:
      tags: [Webhook Endpoints]
      summary: Recompute a webhook delivery's signature (never returns the secret)
      description: >-
        Roles: admin, operator. Scope: `webhooks:read`. Recomputes the
        HMAC-SHA256 signature over the stored `canonical_body` using the OWNING
        endpoint's CURRENT secret (the same routine the sender uses per attempt)
        and returns the algorithm + hex signature + endpoint id. The secret is
        NEVER returned. Tenant-scoped: a foreign/absent delivery id — or an
        owning endpoint no longer resolvable for your tenant — returns `404` (no
        oracle). ROTATED-SECRET CAVEAT: because the recompute uses the CURRENT
        secret, the returned signature DIFFERS from the originally-delivered
        `X-NexusPay-Signature` header if the secret was rotated AFTER delivery —
        it is not proof the original delivery was mis-signed.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The recomputed signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliverySignatureResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/api-keys:
    post:
      tags: [API Keys]
      summary: Create a new API key
      description: >-
        Role: admin. The full `key` is shown ONCE and cannot be retrieved again.
        `live: false` mints an `sk_test_` key (test mode); `live: true` mints
        `sk_live_`.
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created (full key included once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      description: 'Role: admin.'
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Key revoked (no content)

  /v1/api-keys/{id}/rotate:
    post:
      tags: [API Keys]
      summary: Rotate an API key with an overlap window
      description: >-
        Role: admin. Mints a NEW key (shown once) and shortens the old key's
        life to an overlap deadline so callers can swap without downtime. The
        old key's lifetime is only ever SHORTENED, never extended. Tenant-scoped:
        an other-tenant key id is indistinguishable from a missing one.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateApiKeyRequest'
      responses:
        '201':
          description: New key created (full key included once); old key shortened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/customers:
    post:
      tags: [Customers]
      summary: Create a customer
      description: >-
        Scope: `customers:write`. Creates a customer under the AUTHENTICATED
        tenant (derived from the key, never an `X-Tenant-Id` header or the
        request body). `livemode` is server-derived from the key mode (a test
        key creates `livemode:false`, a live key `livemode:true`) and is NOT
        client-settable. The id is minted server-side (`cus_…`).
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: The created customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    get:
      tags: [Customers]
      summary: List customers for the current tenant
      description: >-
        Scope: `customers:read`. Lists the AUTHENTICATED tenant's customers
        (never another tenant's). Soft-deleted customers are excluded.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The caller tenant's customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

  /v1/customers/{id}:
    get:
      tags: [Customers]
      summary: Retrieve a customer by id
      description: >-
        Scope: `customers:read`. Tenant-scoped — a foreign-tenant OR soft-deleted
        id returns 404 with no existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Customers]
      summary: Update a customer
      description: >-
        Scope: `customers:write`. Updates the mutable fields
        (email/name/description/metadata). `livemode` is immutable. Tenant-scoped
        — a foreign-tenant OR soft-deleted id returns 404 with no existence
        oracle. POST-to-id (Stripe-style) mirrors the dispute submit idiom.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: The updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Customers]
      summary: Delete a customer (soft delete)
      description: >-
        Scope: `customers:write`. SOFT-deletes the customer (sets `deleted_at`).
        After deletion the customer no longer appears in retrieve/list.
        Tenant-scoped — a foreign-tenant OR already-deleted id returns 404 with no
        existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The customer was soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedCustomer'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/customers/{customerId}/payment_methods:
    post:
      tags: [Payment Methods]
      summary: Attach a saved payment method to a customer
      description: >-
        Scope: `customers:write`. Attaches a saved, multi-use payment method to a
        tenant-owned customer under the AUTHENTICATED tenant (derived from the key,
        never an `X-Tenant-Id` header). `livemode` is server-derived from the key
        mode and MUST equal the customer's livemode (400 on mismatch). The id is
        minted server-side (`pm_…`). A foreign-tenant customer id returns 404 (no
        existence oracle). PCI: NO raw PAN is ever accepted — see
        `AttachPaymentMethodRequest`.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
          description: The `cus_` id to attach the method to (must belong to the caller's tenant).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachPaymentMethodRequest'
      responses:
        '201':
          description: The attached payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '400':
          description: >-
            A raw-PAN-like body field, a fixture token under a live key, a
            livemode mismatch, or an unknown/missing credential.
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Payment Methods]
      summary: List a customer's saved payment methods
      description: >-
        Scope: `customers:read`. Lists the customer's live (non-detached) saved
        methods, newest first. The customer is resolved tenant-scoped first — a
        foreign-tenant customer id returns 404 (no existence oracle), NOT an empty
        list.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max methods to return (default 20, capped at 100 server-side).
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          description: Number of methods to skip for pagination (default 0).
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The customer's saved payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/payment_methods/{id}:
    get:
      tags: [Payment Methods]
      summary: Retrieve a saved payment method by id
      description: >-
        Scope: `customers:read`. Tenant-scoped — a foreign-tenant OR detached id
        returns 404 with no existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Payment Methods]
      summary: Detach a saved payment method (soft delete)
      description: >-
        Scope: `customers:write`. DETACH = soft-deletes the method (sets
        `deleted_at`). After detach the method no longer appears in retrieve or the
        customer's list. Tenant-scoped — a foreign-tenant OR already-detached id
        returns 404 with no existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The payment method was detached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedPaymentMethod'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/mandates:
    post:
      tags: [Mandates]
      summary: Record a mandate (consent) from a saved payment method
      description: >-
        Scope: `customers:write`. Records a customer's stored consent to be charged
        off-session, from a tenant-owned saved method (`pm_…`). The `pm_` is resolved
        tenant-scoped (a foreign/missing one returns 404, no existence oracle); its
        `livemode` must match the key mode (400 `livemode_mismatch`); the mandate's
        `customer` is DERIVED from the `pm_`'s owner (never client-supplied). The id
        is minted server-side (`mandate_…`) and the created mandate is `ACTIVE`.
        Tenant is the AUTHENTICATED key's tenant — never an `X-Tenant-Id` header.
        REUSES the `customers:*` scopes (a mandate is part of the saved-credential
        consent cluster).
      security:
        - apiKey: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMandateRequest'
      responses:
        '201':
          description: The recorded mandate (status ACTIVE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandate'
        '400':
          description: >-
            A livemode mismatch (`livemode_mismatch`) or an invalid `type`
            (`invalid_type`).
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Mandates]
      summary: List the tenant's mandates
      description: >-
        Scope: `customers:read`. Lists the AUTHENTICATED tenant's mandates, newest
        first (including revoked/INACTIVE ones). Tenant-scoped server-side.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Max mandates to return (default 20, capped at 100 server-side).
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          description: Number of mandates to skip for pagination (default 0).
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The tenant's mandates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mandate'

  /v1/mandates/{id}:
    get:
      tags: [Mandates]
      summary: Retrieve a mandate by id
      description: >-
        Scope: `customers:read`. Tenant-scoped — a foreign-tenant OR absent id
        returns 404 with no existence oracle. A revoked (INACTIVE) mandate IS still
        retrievable (revoke is not a soft delete).
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The mandate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandate'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/mandates/{id}/revoke:
    post:
      tags: [Mandates]
      summary: Revoke (deactivate) a mandate
      description: >-
        Scope: `customers:write`. Deactivates the consent — status becomes `INACTIVE`
        and `revoked_at` is stamped. This is NOT a soft delete: the mandate stays
        retrievable (and a cited revoked mandate fails the off-session charge gate
        with 400 `invalid_mandate`). Tenant-scoped — a foreign-tenant OR absent id
        returns 404 with no existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The mandate (now INACTIVE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokedMandate'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/disputes:
    get:
      tags: [Disputes]
      summary: List disputes for the current tenant
      description: >-
        Scope: `disputes:read`. Lists the AUTHENTICATED tenant's disputes
        (chargebacks) — never another tenant's (the tenant is derived from the
        key, never an `X-Tenant-Id` header). Optionally filter by `status`.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Optional dispute status filter (e.g. `OPENED`, `WON`, `LOST`).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: The caller tenant's disputes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dispute'

  /v1/disputes/{id}:
    get:
      tags: [Disputes]
      summary: Retrieve a dispute by id
      description: >-
        Scope: `disputes:read`. Tenant-scoped — a foreign-tenant id returns 404
        with no existence oracle.
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The dispute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/disputes/{id}/events:
    get:
      tags: [Disputes]
      summary: Get a dispute's event timeline
      description: >-
        Scope: `disputes:read`. Returns the dispute's immutable event timeline,
        tenant-scoped (a foreign/absent id yields an empty list — no oracle).
      security:
        - apiKey: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: The dispute event timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisputeEvent'

  /v1/test/disputes:
    post:
      tags: [Test Helpers]
      summary: Simulate a dispute (TEST MODE ONLY)
      description: >-
        TEST-MODE ONLY. Reachable ONLY with an `sk_test_` key — a LIVE key gets
        404 (no oracle). Opens a dispute (chargeback) on a TEST payment
        (`pay_test_*`) under the CALLER's tenant and emits a `dispute.created`
        (and `dispute.funds_withdrawn`) webhook through the normal signed
        delivery pipeline, stamped `livemode: false`, so an integrator can drive
        their chargeback-handling locally. The `payment_id` MUST be a
        `pay_test_*` id (anything else is rejected `400`); it is treated as an
        opaque test reference and is NOT resolved against the payments service,
        so a `pay_test_*` id need not correspond to a real payment. The dispute
        is always opened under the caller's own tenant, so the emitted
        `dispute.*` events fan out only to the caller's own webhook endpoints.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateDisputeRequest'
      responses:
        '201':
          description: The simulated dispute was created (webhook emitted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Endpoint not reachable with this key (live key in test-only surface)

  /v1/test/events:
    post:
      tags: [Test Helpers]
      summary: Trigger a synthetic webhook event (TEST MODE ONLY)
      description: >-
        TEST-MODE ONLY. Reachable ONLY with an `sk_test_` key — a LIVE key gets
        404 (no oracle). Scope: `webhooks:write`. Synthesizes + delivers a
        canonical webhook of the chosen `type` to the CALLER's OWN tenant's
        enabled endpoints, through the SAME signed delivery pipeline a real event
        would, stamped `livemode: false` — so an integrator can exercise their
        webhook receiver WITHOUT driving a real payment. `type` MUST be a
        canonical dotted event name (an unknown/`*` type is rejected `400`). The
        optional `id` is an opaque test aggregate id (defaulted server-side with
        the aggregate-correct prefix, e.g. `pay_test_*` / `dp_test_*`); it is NOT
        resolved against any aggregate. The optional `data` object is overlaid
        onto the synthesized `data.object`. The tenant is always the caller's
        own, so the event fans out only to the caller's own endpoints. NOTE: the
        event only delivers if the caller tenant has an ENABLED endpoint
        subscribed to `type` (or `*`) — register/subscribe one first.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestEventRequest'
      responses:
        '202':
          description: The synthetic event was synthesized + queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestEventResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Endpoint not reachable with this key (live key in test-only surface)

  /v1/ping:
    get:
      tags: [Connectivity]
      summary: Authenticated connectivity + credentials check
      description: >-
        A lightweight AUTHENTICATED connectivity + credentials check. A `200`
        confirms three things in one cheap call: the base URL is reachable, the
        API key is VALID (an unauthenticated/invalid key is rejected `401` before
        the handler runs), and which MODE the key is. `livemode` is derived
        SERVER-SIDE from the authenticated key's mode (an `sk_test_` key ->
        `false`, an `sk_live_` key -> `true`), never from a client header — so an
        integrator can confirm test-vs-live. The body carries NO tenant id (nor
        scopes, nor the key, nor any principal detail). Distinct from
        `/actuator/health`, which is an unauthenticated infra probe.
      security:
        - apiKey: []
      responses:
        '200':
          description: The key authenticated; connectivity + mode confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier (prefixed id, e.g. `pay_…`, `we_…`).
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: >-
        Caller-chosen key making a POST safely retryable. The first response is
        cached for 24h per caller; 5xx responses are not cached.

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Resource not found (or cross-tenant — no existence oracle)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Conflict:
      description: Resource is in an invalid state for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    PaymentError:
      description: Payment blocked (fraud/compliance) or processing error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: >-
        Merchant API key. Send as `Authorization: Bearer sk_test_…` (or
        `sk_live_…` in production). Validated by ApiKeyAuthenticationFilter.
    sessionToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Short-lived checkout session token (JWT) for `/v1/checkout/**` endpoints
        (browser SDK). Send as `Authorization: Bearer <session-jwt>`.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Keycloak OIDC access token (JWT) for dashboard/back-office endpoints.
        Send as `Authorization: Bearer <oidc-jwt>`.

  schemas:
    CreatePaymentRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Amount in minor units (e.g. cents).
          example: 5000
        currency:
          type: string
          description: Three-letter ISO 4217 currency code.
          example: USD
        customer_id:
          type: string
        payment_method_type:
          type: string
          example: card
        payment_method_data:
          type: string
        return_url:
          type: string
        description:
          type: string
        capture_method:
          type: string
          enum: [automatic, manual]
          description: >-
            Capture method. AUTHORITATIVE when present: if both `capture_method`
            and `capture` are supplied, `capture_method` wins and `capture` is
            ignored.
          example: automatic
        capture:
          type: boolean
          description: >-
            Convenience alias (INT-2): `true` → automatic, `false` → manual.
            Only fills a null/blank `capture_method`; ignored when
            `capture_method` is present.
          example: true
        metadata:
          type: object
          additionalProperties: true
          description: >-
            Arbitrary merchant key-value metadata. Round-trips onto the payment
            and into the webhook envelope's `data.metadata` for correlation.
        payment_method:
          type: string
          description: >-
            TEST-3c: a saved payment-method id (`pm_...`) to charge OFF-SESSION
            (the cardholder is not present). When present, the server resolves
            this tenant-owned saved method (its opaque credential + customer)
            instead of taking the inline-card path. Test recipe: attach
            `pm_card_visa` then create with `payment_method` + `off_session:true`
            → succeeds (`payment.captured`); `pm_card_chargeDeclined` →
            `payment.failed`.
          example: pm_1a2b3c
        off_session:
          type: boolean
          description: >-
            TEST-3c: whether this is an off-session charge (cardholder not
            present). Forwarded to the PSP as a charge hint.
          example: true
        setup_future_usage:
          type: string
          enum: [off_session, on_session]
          description: 'TEST-3c: intended future usage of the payment method.'
          example: off_session
        mandate_id:
          type: string
          description: >-
            TEST-3d: a cited mandate id (`mandate_*`) is a VALIDATED CONSENT GATE
            for an off-session charge. When present it MUST be an ACTIVE mandate
            belonging to the caller's tenant that authorizes the charged
            `payment_method` (`pm_*`): a foreign/missing mandate (or the
            tenant-scoped `payment_method` resolution) returns 404 (no existence
            oracle); a non-ACTIVE (revoked/inactive) mandate returns 400
            `invalid_mandate`; a mandate authorizing a different `payment_method`
            returns 400 `mandate_payment_method_mismatch`. The gateway is never
            reached on any of these, so no money moves. A null/absent mandate_id
            is the 3c pass-through (no consent gate; threaded to the PSP unchanged).
          example: mandate_1a2b3c

    PaymentApiResponse:
      type: object
      description: >-
        Payment object (NON_NULL — absent fields are omitted). The create
        response (POST /v1/payments) returns only the payment `id` (no
        `client_secret`); a browser `client_secret` comes from
        `POST /v1/payment-sessions` (`PaymentSessionResponse`).
      properties:
        id:
          type: string
        status:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in minor units.
        currency:
          type: string
        capture_method:
          type: string
          enum: [automatic, manual]
        customer_id:
          type: string
        connector:
          type: string
          description: Connector that processed the payment (`mock` in test mode).
        error_code:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        mode:
          type: string
          enum: [test, live]
          description: >-
            Key mode that produced this payment. SERVER-DERIVED from the
            authenticated key's is_live — never from the request body.
        livemode:
          type: boolean
          description: >-
            true when mode == live; mirrors the webhook envelope's livemode.
            Omitted (NON_NULL) on responses that also omit mode.

    CreatePaymentSessionRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Amount in minor units.
          example: 5000
        currency:
          type: string
          example: USD
        customer_id:
          type: string
        success_url:
          type: string
        cancel_url:
          type: string
        allowed_payment_methods:
          type: array
          items:
            type: string
          example: ["card"]
        branding:
          type: object
          additionalProperties: true
          description: Merchant branding for hosted checkout (logo_url, accent_color, etc.).
        metadata:
          type: object
          additionalProperties: true

    PaymentSessionResponse:
      type: object
      description: Payment session (NON_NULL).
      properties:
        id:
          type: string
        status:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in minor units.
        currency:
          type: string
        customer_id:
          type: string
        payment_intent_id:
          type: string
        client_secret:
          type: string
          description: >-
            The session JWT the browser SDK loads. Present ONLY on the create
            response — never returned by GET.
        allowed_payment_methods:
          type: array
          items:
            type: string
        success_url:
          type: string
        cancel_url:
          type: string
        branding:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ConfirmPaymentRequest:
      type: object
      description: Confirm a payment intent (all fields optional).
      properties:
        payment_method_type:
          type: string
          example: card
        payment_method_data:
          type: string
        return_url:
          type: string

    CapturePaymentRequest:
      type: object
      properties:
        amount_to_capture:
          type: integer
          format: int64
          description: Amount to capture in minor units. Omit to capture the full amount.

    CancelPaymentRequest:
      type: object
      properties:
        cancellation_reason:
          type: string

    CreateRefundRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          description: Refund amount in minor units.
          example: 2500
        currency:
          type: string
          example: USD
        reason:
          type: string

    RefundApiResponse:
      type: object
      description: Refund object (201 create body, NON_NULL).
      properties:
        id:
          type: string
        payment_id:
          type: string
        status:
          type: string
        amount:
          type: integer
          format: int64
          description: Amount in minor units.
        currency:
          type: string
        reason:
          type: string
        connector:
          type: string
        error_code:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        requires_approval:
          type: boolean
          description: Always `false` on a 201 created refund (symmetry with the 202 shape).
          example: false

    ApprovalResponse:
      type: object
      description: Pending approval object (202 refund body, NON_NULL).
      properties:
        id:
          type: string
          description: The approval request id (read `id` for the approval id).
        action:
          type: string
          description: Action requiring approval (e.g. refund).
        resource_type:
          type: string
        resource_id:
          type: string
        status:
          type: string
          enum: [pending_approval, approved, rejected]
        requested_by:
          type: string
        reviewed_by:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
        requires_approval:
          type: boolean
          description: Always `true` on the 202 approval-required body.
          example: true
        approval_threshold:
          type: integer
          format: int64
          description: Maker-checker threshold in minor units above which approval is required.

    CreateWebhookEndpointRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          description: >-
            HTTPS URL to receive webhook events. SEC-4b SSRF gate: must be public
            HTTPS; loopback/private/link-local/metadata hosts are rejected (400).
          example: https://merchant.com/webhooks
        description:
          type: string
        events:
          type: array
          minItems: 1
          description: >-
            Event types to subscribe to. Canonical dotted names (see
            `WebhookEventType`) or the `"*"` wildcard. An unknown name → 400.
          items:
            type: string
          example: ["payment.succeeded", "payment.refunded"]

    WebhookEndpointResponse:
      type: object
      description: Webhook endpoint registration (NON_NULL).
      properties:
        id:
          type: string
        url:
          type: string
        description:
          type: string
        secret:
          type: string
          description: >-
            Signing secret (`whsec_…`). Returned ONLY at creation and on
            rotate-secret — never on list.
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    WebhookDeliveryResponse:
      type: object
      description: >-
        Outbound webhook delivery attempt record (NON_NULL). Carries no event
        body and no secret by construction.
      properties:
        id:
          type: string
        endpoint_id:
          type: string
        event_id:
          type: string
          description: Stable logical event id (the dedupe key on the envelope).
        event_type:
          type: string
        status:
          type: string
          enum: [PENDING, DELIVERED, FAILED, DEAD]
        attempt_count:
          type: integer
        max_attempts:
          type: integer
        last_status_code:
          type: integer
        last_error:
          type: string
        next_attempt_at:
          type: string
          format: date-time
          description: When the next retry is due (null once DELIVERED/DEAD).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          description: When the delivery succeeded (null until DELIVERED).

    WebhookDeliveryBodyResponse:
      type: object
      description: >-
        The EXACT delivered body of one webhook delivery the caller owns
        (NON_NULL). Carries the caller's OWN delivered bytes; never a secret.
      properties:
        id:
          type: string
        endpoint_id:
          type: string
        event_id:
          type: string
        event_type:
          type: string
        canonical_body:
          type: string
          description: The exact canonical envelope bytes that were delivered + signed.

    WebhookDeliverySignatureResponse:
      type: object
      description: >-
        Recomputed HMAC signature for one webhook delivery the caller owns
        (NON_NULL). Never includes the signing secret.
      properties:
        id:
          type: string
        endpoint_id:
          type: string
        algorithm:
          type: string
          example: HmacSHA256
        signature:
          type: string
          description: >-
            Hex HMAC-SHA256 of `canonical_body` keyed by the endpoint's CURRENT
            secret.
        rotated_secret_caveat:
          type: string
          description: >-
            Caveat: the recompute uses the CURRENT secret, so this DIFFERS from
            the originally-delivered `X-NexusPay-Signature` header if the secret
            was rotated after delivery.

    WebhookDeliveryPage:
      type: object
      description: A Spring `Page` of delivery records.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/WebhookDeliveryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
          description: Zero-based page index.
        size:
          type: integer

    CreateApiKeyRequest:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          example: Production Key
        role:
          type: string
          enum: [admin, operator, viewer]
          example: operator
        live:
          type: boolean
          description: '`false` → sk_test_ (test mode); `true` → sk_live_.'
          example: false
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            Optional ISO-8601 expiry instant. Must be in the future. Omit for a
            key that never expires.
          example: '2027-01-01T00:00:00Z'

    RotateApiKeyRequest:
      type: object
      description: >-
        Rotate a key with an overlap window during which the old key still works.
      properties:
        overlapSeconds:
          type: integer
          format: int64
          minimum: 0
          nullable: true
          description: >-
            Seconds the old key keeps working after rotation (default 86400 =
            24h, capped at 604800 = 7 days). The old key's lifetime is only ever
            SHORTENED, never extended. Zero retires the old key immediately.
          example: 86400

    CreateApiKeyResponse:
      type: object
      description: Newly created (or rotated) API key. The full `key` is shown ONCE.
      properties:
        id:
          type: string
        key:
          type: string
          description: Full API key — store securely, it will not be shown again.
        key_prefix:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer]
        live:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the key expires, or null if it never expires.

    WebhookEventType:
      type: string
      description: Canonical dotted webhook event names a merchant may subscribe to.
      enum:
        - payment.created
        - payment.authorized
        - payment.succeeded
        - payment.failed
        - payment.canceled
        - payment.refund.created
        - payment.refunded
        - payment.refund.failed

    WebhookEvent:
      type: object
      description: >-
        Canonical webhook envelope POSTed to a registered endpoint. The HMAC
        signature is computed over the EXACT serialized bytes of this object.
        Emitted top-level key order is: id, type, livemode, created, api_version,
        data.
      required: [id, type, livemode, created, api_version, data]
      properties:
        id:
          type: string
          description: Stable event id. The dedupe key; stable across redelivery.
          example: evt_xxx
        type:
          $ref: '#/components/schemas/WebhookEventType'
        livemode:
          type: boolean
          description: >-
            Server-derived: false in test mode, true in live. Mirrors the
            payment's mode.
          example: false
        created:
          type: integer
          format: int64
          description: Event creation time as **epoch SECONDS** (UTC).
          example: 1750000000
        api_version:
          type: string
          description: Contract version. Constant.
          example: "2026-06-16"
        data:
          type: object
          required: [object, metadata]
          properties:
            object:
              type: object
              description: >-
                Normalized payment/refund object. PSP keys pass through (minus
                card subtrees) plus an `object` discriminator and `id`.
              required: [id, object]
              properties:
                id:
                  type: string
                  example: pay_test_xxx
                object:
                  type: string
                  enum: [payment, refund]
              additionalProperties: true
            metadata:
              type: object
              additionalProperties: true
              description: >-
                Merchant correlation map, round-tripped from your create call
                ({} if none). NOT the PSP echo.

    ApiErrorResponse:
      type: object
      description: 'INT-2 error envelope: { error: { type, code, message, request_id } }.'
      required: [error]
      properties:
        error:
          type: object
          required: [type, code, message, request_id]
          properties:
            type:
              type: string
              enum:
                - validation_error
                - not_found
                - unauthorized
                - forbidden
                - conflict
                - payment_error
                - rate_limit_error
                - internal_error
                - session_error
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Safe, human-readable message (never leaks internals).
            request_id:
              type: string
              description: Correlation id (echoes X-Request-Id); always present.

    Customer:
      type: object
      description: A customer — the anchor of the saved-credential cluster. Tenant-scoped; the tenant is never exposed in the body.
      properties:
        id:
          type: string
          description: Customer id (prefixed `cus_…`).
          example: cus_3f2a9c1b
        object:
          type: string
          enum: [customer]
        livemode:
          type: boolean
          description: Server-derived from the key mode at create time (test key -> false). Immutable.
        email:
          type: string
          nullable: true
          example: jane@example.com
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created:
          type: integer
          format: int64
          description: Creation time in epoch seconds.

    CreateCustomerRequest:
      type: object
      description: Body for `POST /v1/customers`. Carries NO tenant or livemode field (both are server-derived).
      properties:
        email:
          type: string
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateCustomerRequest:
      type: object
      description: Body for `POST /v1/customers/{id}`. Only the mutable fields; `livemode` is immutable and not accepted.
      properties:
        email:
          type: string
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    DeletedCustomer:
      type: object
      description: Body returned by `DELETE /v1/customers/{id}` (soft delete).
      properties:
        id:
          type: string
          example: cus_3f2a9c1b
        object:
          type: string
          enum: [customer]
        deleted:
          type: boolean
          enum: [true]

    PaymentMethodCard:
      type: object
      description: >-
        The display surface of a saved payment method. NEVER carries a raw PAN —
        only the brand/last4/expiry/funding a saved card legitimately exposes.
      properties:
        brand:
          type: string
          nullable: true
          example: visa
        last4:
          type: string
          nullable: true
          example: '4242'
        exp_month:
          type: integer
          nullable: true
          example: 12
        exp_year:
          type: integer
          nullable: true
          example: 2034
        funding:
          type: string
          nullable: true
          example: credit

    PaymentMethod:
      type: object
      description: >-
        A saved, multi-use payment method attached to a customer. Tenant-scoped;
        the tenant and the opaque credential_ref are NEVER exposed in the body.
      properties:
        id:
          type: string
          description: Payment method id (prefixed `pm_…`).
          example: pm_8a1c4d2e
        object:
          type: string
          enum: [payment_method]
        livemode:
          type: boolean
          description: Server-derived from the key mode; equals the customer's livemode.
        type:
          type: string
          example: card
        customer:
          type: string
          description: The `cus_` id this method is attached to.
          example: cus_3f2a9c1b
        card:
          $ref: '#/components/schemas/PaymentMethodCard'
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created:
          type: integer
          format: int64
          description: Creation time in epoch seconds.

    AttachPaymentMethodRequest:
      type: object
      description: >-
        Body for `POST /v1/customers/{customerId}/payment_methods`. Carries NO
        tenant or livemode field (both are server-derived). PCI: NO raw PAN is ever
        accepted — there is deliberately no `number`/`cvc`/`pan`/`card` field, and a
        body smuggling one is rejected 400. In TEST mode `credential_ref` is a
        fixture token (e.g. `pm_card_visa`, `pm_card_mastercard`, `pm_card_amex`,
        `pm_card_chargeDeclined`) accepted ONLY under a `sk_test_` key (a fixture
        under a live key -> 400); in LIVE mode it is an opaque pre-tokenized
        reference (e.g. a `ptok_`/PSP pm id) stored verbatim. Display fields
        (brand/last4/exp_month/exp_year/funding) are used only on the live/opaque
        path — in test mode the fixture is authoritative.


        Unknown top-level fields are REJECTED (400): the server binds this body with
        `FAIL_ON_UNKNOWN_PROPERTIES=true`, so a smuggled `number`/`cvc`/`pan`/`card`
        (or a card number under any innocuous key) fails at binding rather than being
        silently dropped.
      additionalProperties: false
      required:
        - credential_ref
      properties:
        type:
          type: string
          example: card
        credential_ref:
          type: string
          description: A test fixture token (test mode) or an opaque pre-tokenized reference (live mode).
          example: pm_card_visa
        brand:
          type: string
        last4:
          type: string
        exp_month:
          type: integer
        exp_year:
          type: integer
        funding:
          type: string
        metadata:
          type: object
          additionalProperties: true

    DeletedPaymentMethod:
      type: object
      description: Body returned by `DELETE /v1/payment_methods/{id}` (detach = soft delete).
      properties:
        id:
          type: string
          example: pm_8a1c4d2e
        object:
          type: string
          enum: [payment_method]
        deleted:
          type: boolean
          enum: [true]

    Mandate:
      type: object
      description: >-
        A mandate / consent record — a customer's stored consent to be charged
        off-session with a saved method, and the consent an off-session charge's
        `mandate_id` references. Tenant-scoped; the tenant is NEVER exposed in the
        body. `customer` is derived from the `pm_`'s owner.
      properties:
        id:
          type: string
          description: Mandate id (prefixed `mandate_…`).
          example: mandate_8a1c4d2e
        object:
          type: string
          enum: [mandate]
        livemode:
          type: boolean
          description: Server-derived from the key mode; equals the `pm_`'s livemode.
        status:
          type: string
          description: PENDING / ACTIVE / INACTIVE. A created mandate is ACTIVE; revoke makes it INACTIVE.
          example: ACTIVE
        type:
          type: string
          enum: [MULTI_USE, SINGLE_USE]
          description: >-
            MULTI_USE / SINGLE_USE. NOTE (3d): `type` is a recorded DESCRIPTIVE
            hint, not an enforced control. In 3d a SINGLE_USE mandate is NOT
            self-consumed — it stays ACTIVE after an off-session charge and the
            consent gate (tenant + ACTIVE + matching `payment_method`) does NOT
            consider `type`, so a SINGLE_USE mandate can be cited on more than one
            off-session charge. Do NOT rely on the API to enforce single-use;
            single-use consumption is a later increment. Revoke the mandate to
            stop further use.
          example: MULTI_USE
        customer:
          type: string
          description: The `cus_` id (derived from the `pm_`'s owner).
          example: cus_3f2a9c1b
        payment_method:
          type: string
          description: The `pm_` the consent authorizes.
          example: pm_8a1c4d2e
        scenario:
          type: string
          nullable: true
          description: e.g. recurring / unscheduled.
          example: recurring
        created:
          type: integer
          format: int64
          description: Creation time in epoch seconds.

    CreateMandateRequest:
      type: object
      description: >-
        Body for `POST /v1/mandates`. Carries NO tenant, customer, or livemode field
        (tenant + livemode are server-derived; customer is derived from the `pm_`'s
        owner). The `payment_method` (`pm_…`) is the saved method the consent
        authorizes.
      required:
        - payment_method
      properties:
        payment_method:
          type: string
          description: The `pm_` id the consent authorizes (must belong to the caller's tenant).
          example: pm_8a1c4d2e
        type:
          type: string
          enum: [MULTI_USE, SINGLE_USE]
          description: >-
            MULTI_USE / SINGLE_USE (defaults to MULTI_USE). NOTE (3d): SINGLE_USE
            is a recorded descriptive hint only — it is NOT enforced; a SINGLE_USE
            mandate is not self-consumed and may be cited on more than one
            off-session charge. Revoke to stop further use.
          example: MULTI_USE
        scenario:
          type: string
          example: recurring
        metadata:
          type: object
          additionalProperties: true

    RevokedMandate:
      allOf:
        - $ref: '#/components/schemas/Mandate'
      description: >-
        Body returned by `POST /v1/mandates/{id}/revoke` — the full mandate body, now
        `status: INACTIVE` (revoke is NOT a soft delete; the mandate stays
        retrievable).

    Dispute:
      type: object
      description: A dispute (chargeback) raised by a card network against a payment.
      properties:
        id:
          type: string
          description: Dispute id (prefixed `dp_…`).
          example: dp_3f2a9c1b
        tenant_id:
          type: string
        payment_id:
          type: string
          description: The disputed payment's id.
          example: pay_test_abc123
        external_dispute_id:
          type: string
          description: The network/PSP dispute id (or a `test_dp_*` id for a simulated dispute).
        reason_code:
          type: string
          example: '10.4'
        reason_description:
          type: string
        amount:
          type: integer
          format: int64
          description: Disputed amount in minor units.
          example: 5000
        currency:
          type: string
          example: USD
        status:
          type: string
          description: Dispute state.
          enum: [OPENED, EVIDENCE_NEEDED, EVIDENCE_SUBMITTED, WON, LOST, EXPIRED]
        network:
          type: string
          example: visa
        outcome:
          type: string
          nullable: true
          enum: [WON, LOST, EXPIRED, null]
        evidence_due_date:
          type: string
          format: date-time
          nullable: true
        evidence_submitted_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DisputeEvent:
      type: object
      description: One entry of a dispute's immutable event timeline.
      properties:
        id:
          type: string
        dispute_id:
          type: string
        event_type:
          type: string
          description: Internal event type (e.g. STATE_TRANSITION, EVIDENCE_UPLOADED).
        old_status:
          type: string
          nullable: true
        new_status:
          type: string
          nullable: true
        actor:
          type: string
        details:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    SimulateDisputeRequest:
      type: object
      required: [payment_id]
      description: Body for the test-mode dispute simulator (`POST /v1/test/disputes`).
      properties:
        payment_id:
          type: string
          description: A TEST payment id (`pay_test_*`) owned by the caller's tenant.
          example: pay_test_abc123
        amount:
          type: integer
          format: int64
          description: Disputed amount in minor units (defaults to 1000).
          example: 5000
        currency:
          type: string
          description: ISO 4217 currency (defaults to USD).
          example: USD
        reason:
          type: string
          description: Dispute reason code (defaults to `fraudulent`).
          example: fraudulent

    TestEventRequest:
      type: object
      required: [type]
      description: Body for the test-mode webhook-event trigger (`POST /v1/test/events`).
      properties:
        type:
          type: string
          description: >-
            A canonical dotted event type (see `WebhookEventType`). An unknown
            name or the `"*"` wildcard is rejected `400`.
          example: payment.succeeded
        id:
          type: string
          description: >-
            Optional opaque test aggregate id. Defaulted server-side with the
            aggregate-correct prefix (`pay_test_*` / `dp_test_*`) when omitted.
            NOT resolved against any aggregate.
          example: pay_test_abc123
        data:
          type: object
          additionalProperties: true
          description: Optional overlay merged onto the synthesized `data.object`.

    TestEventResponse:
      type: object
      description: The synthesized test event (NON_NULL).
      properties:
        id:
          type: string
          description: Stable event id (matches the delivered webhook's `id`).
          example: evt_abc123
        type:
          type: string
          example: payment.succeeded
        livemode:
          type: boolean
          description: Always false — a test trigger can never synthesize a live event.
          example: false
        object:
          type: object
          additionalProperties: true
          description: The synthesized `data.object` delivered in the webhook body.

    PingResponse:
      type: object
      description: >-
        Connectivity + credentials check result. Carries NO tenant id (nor
        scopes, nor the key) — only liveness, the authenticated key's mode, and
        the contract version.
      required: [ok, livemode, api_version]
      properties:
        ok:
          type: boolean
          description: Always true when the call authenticated and reached the handler.
          example: true
        livemode:
          type: boolean
          description: >-
            The authenticated KEY's mode, derived server-side (test key ->
            false, live key -> true). Never read from a client header.
          example: false
        api_version:
          type: string
          description: The current contract version (`ApiVersion.CURRENT`).
          example: 2026-06-16
