spring:
  application:
    name: nexuspay
  threads:
    virtual:
      enabled: true

  # Database
  datasource:
    url: ${NEXUSPAY_DB_URL:jdbc:postgresql://localhost:5432/nexuspay}
    username: ${NEXUSPAY_DB_USER:nexuspay}
    password: ${NEXUSPAY_DB_PASSWORD:nexuspay_local}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  # Flyway — module-specific paths added via FlywayConfigurationCustomizer beans per module (GAP-017)
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true

  # Kafka (producer/consumer config in Java: KafkaProducerConfig, KafkaConsumerConfig)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # Redis/Valkey
  data:
    redis:
      url: ${VALKEY_URL:redis://localhost:6379}

  # Security defaults (overridden per profile)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/nexuspay

# Server
server:
  port: 8090
  shutdown: graceful

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: nexuspay
    distribution:
      slo:
        http.server.requests: 50ms, 100ms, 250ms, 500ms, 1000ms, 2000ms
        nexuspay.payments.latency: 50ms, 100ms, 250ms, 500ms, 1000ms, 2000ms
  prometheus:
    metrics:
      export:
        enabled: true

# Vault — disabled by default for local dev; enable with 'vault' Spring profile
# When enabled, secrets are loaded from Vault instead of env vars / defaults.
# spring.cloud.vault:
#   uri: ${VAULT_URL:http://localhost:8200}
#   token: ${VAULT_TOKEN:nexuspay-dev-token}
#   kv:
#     enabled: true
#     backend: secret
#     default-context: nexuspay

# NexusPay Configuration
nexuspay:
  multi-tenancy:
    rls:
      enabled: ${NEXUSPAY_RLS_ENABLED:true}
  hyperswitch:
    base-url: ${HYPERSWITCH_BASE_URL:http://localhost:8080}
    api-key: ${HYPERSWITCH_API_KEY:dev_api_key_for_local}
    webhook-secret: ${HYPERSWITCH_WEBHOOK_SECRET:webhook_secret_for_local}
  ledger:
    reconciliation-cron: "0 0 * * * *"
  kafka:
    replication-factor: ${KAFKA_REPLICATION_FACTOR:1}
    partitions: ${KAFKA_PARTITIONS:6}
  iam:
    refund-approval-threshold: 50000
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:100}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  retention:
    outbox-days: ${RETENTION_OUTBOX_DAYS:7}
    webhook-days: ${RETENTION_WEBHOOK_DAYS:90}
  outbox:
    polling:
      enabled: ${NEXUSPAY_OUTBOX_POLLING_ENABLED:true}  # Disable when Debezium CDC is active
  temporal:
    enabled: ${NEXUSPAY_TEMPORAL_ENABLED:false}  # Enable with Temporal running
    target: ${TEMPORAL_TARGET:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    task-queue: ${TEMPORAL_TASK_QUEUE:nexuspay-main}
    worker-threads: ${TEMPORAL_WORKER_THREADS:4}
  reconciliation:
    amount-tolerance: ${RECON_AMOUNT_TOLERANCE:1}     # Minor units (1 = $0.01)
    date-range-days: ${RECON_DATE_RANGE_DAYS:7}       # Settlement date tolerance
    max-batch-size: ${RECON_MAX_BATCH_SIZE:10000}
  dispute:
    auto-submit-threshold: ${DISPUTE_AUTO_SUBMIT_THRESHOLD:100000}   # Minor units ($1,000)
    default-evidence-deadline-days: ${DISPUTE_EVIDENCE_DEADLINE_DAYS:20}
    auto-representment-enabled: ${DISPUTE_AUTO_REPRESENTMENT:true}
  billing:
    dunning:
      retry-schedule: 1,3,5,7                        # Days after initial failure
      grace-period-days: ${BILLING_GRACE_PERIOD:3}
      smart-retry-enabled: ${BILLING_SMART_RETRY:true}
      optimal-hour: 10                                # Retry at 10 AM local time
  fraud:
    enabled: ${NEXUSPAY_FRAUD_ENABLED:true}
    native-rules:
      cache-ttl: PT5M                                 # Valkey cache TTL for rule sets
      default-block-threshold: 80                     # score >= 80 → BLOCK
      default-review-threshold: 50                    # score >= 50 → REVIEW
    scoring:
      native-weight: 0.6                              # 60% weight to native rule score
      frm-weight: 0.4                                 # 40% weight to FRM provider score
    frm:
      primary-provider: sift
      fallback-provider: signifyd
      timeout: PT2S
      circuit-breaker:
        failure-rate-threshold: 50
        wait-duration-in-open-state: PT30S
        sliding-window-size: 20
      sift:
        api-url: ${SIFT_API_URL:https://api.sift.com/v205}
        api-key: ${SIFT_API_KEY:}
        account-id: ${SIFT_ACCOUNT_ID:}
      signifyd:
        api-url: ${SIGNIFYD_API_URL:https://api.signifyd.com/v2}
        api-key: ${SIGNIFYD_API_KEY:}
        team-id: ${SIGNIFYD_TEAM_ID:}
    device-fingerprint:
      enabled: true
      reputation-decay-days: 90
  schema-registry:
    url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    auto-register: true  # overridden to false in application-production.yml
  avro:
    dual-write:
      enabled: ${NEXUSPAY_AVRO_DUAL_WRITE:false}
  event-log:
    enabled: ${NEXUSPAY_EVENT_LOG_ENABLED:true}
  dlq:
    reprocessor:
      enabled: ${NEXUSPAY_DLQ_REPROCESSOR_ENABLED:true}
      fixed-delay-ms: 60000
      max-retries: 5
  session:
    jwt-secret: ${NEXUSPAY_SESSION_JWT_SECRET:dev-session-secret-minimum-32-chars!!}
    default-expiry: PT30M
    max-expiry: PT24H
    token-expiry: PT15M
    max-tokenize-attempts: 10
    multi-use-token-expiry: P365D
  checkout:
    cors-allowed-origins: ${NEXUSPAY_CHECKOUT_CORS_ORIGINS:*}
    cors-max-age: 86400
    hosted-url: ${NEXUSPAY_CHECKOUT_URL:http://localhost:3000/checkout}
  fx:
    enabled: ${NEXUSPAY_FX_ENABLED:true}
    default-provider: ecb
    cache:
      ttl: PT1H                                          # Fresh rate cache TTL
      stale-ttl: PT24H                                   # Serve stale if provider unavailable
      refresh-interval: PT30M                            # Background refresh interval
    rate-lock:
      default-duration: PT15M                            # Default rate lock duration
      max-duration: PT1H                                 # Maximum allowed lock duration
    ecb:
      api-url: ${ECB_API_URL:https://data.ecb.europa.eu/service/data/EXR}
      update-schedule: "0 16 * * 1-5"                    # ECB publishes daily 16:00 CET weekdays
    open-exchange-rates:
      api-url: ${OER_API_URL:https://openexchangerates.org/api}
      app-id: ${OER_APP_ID:}                             # Set to enable OpenExchangeRates provider
    compliance:
      sanctioned-countries: KP,IR,SY,CU                  # OFAC-aligned sanctions list
      cross-border-amount-reporting-threshold: 10000     # USD equivalent, triggers reporting
  analytics:
    enabled: ${NEXUSPAY_ANALYTICS_ENABLED:true}
    pipeline:
      consumer-group: nexuspay-analytics
      batch-size: 100
      batch-timeout-ms: 2000
    rollup:
      hourly-retention-days: 90
      daily-retention-days: 730
      monthly-retention-days: 3650
      daily-rollup-cron: "0 5 0 * * *"
      monthly-rollup-cron: "0 10 0 1 * *"
      materialized-view-refresh-cron: "0 0 * * * *"
    psp-health:
      snapshot-interval-ms: 300000
      anomaly-std-dev-threshold: 2.0
      scoring-weights:
        auth-rate: 0.50
        latency: 0.30
        error-rate: 0.20
    cache:
      ttl: PT5M
    query:
      max-date-range-days: 365
      default-granularity: DAILY
  vault:
    encryption:
      provider: ${NEXUSPAY_VAULT_ENCRYPTION_PROVIDER:software}
      master-key: ${NEXUSPAY_VAULT_MASTER_KEY:ZGV2LXZhdWx0LWtleS1iYXNlNjQtbWluLTMyLWNoYXJzIQ==}
      current-key-id: ${NEXUSPAY_VAULT_KEY_ID:key-001}
    network-tokens:
      visa-enabled: ${NEXUSPAY_VAULT_VISA_ENABLED:true}
      mastercard-enabled: ${NEXUSPAY_VAULT_MC_ENABLED:true}
      amex-enabled: ${NEXUSPAY_VAULT_AMEX_ENABLED:true}
  marketplace:
    enabled: ${NEXUSPAY_MARKETPLACE_ENABLED:true}
    payout-scheduler:
      enabled: ${NEXUSPAY_PAYOUT_SCHEDULER_ENABLED:false}
      interval-ms: ${NEXUSPAY_PAYOUT_SCHEDULER_INTERVAL_MS:60000}
    kyc:
      provider: ${NEXUSPAY_KYC_PROVIDER:stub}
  b2b:
    enabled: ${NEXUSPAY_B2B_ENABLED:true}
    card-issuing:
      provider: ${NEXUSPAY_B2B_CARD_ISSUING_PROVIDER:stub}
      default-expiry-days: ${NEXUSPAY_B2B_CARD_EXPIRY_DAYS:90}
    vendor-payment:
      execution-provider: ${NEXUSPAY_B2B_VENDOR_EXECUTION_PROVIDER:stub}
      batch-max-size: ${NEXUSPAY_B2B_BATCH_MAX_SIZE:100}
    level23:
      enrichment-enabled: ${NEXUSPAY_B2B_LEVEL23_ENABLED:true}
      level3-threshold: ${NEXUSPAY_B2B_LEVEL3_THRESHOLD:500000}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      hyperswitch:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 3
      sift-frm:
        failure-rate-threshold: 50
        sliding-window-size: 20
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 5
      signifyd-frm:
        failure-rate-threshold: 50
        sliding-window-size: 20
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 5
      schema-registry:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 3

# SpringDoc
springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /v1/swagger-ui
