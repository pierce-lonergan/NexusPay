# B-002 RLS ENFORCEMENT profile — active ONLY under the 'rls-enforce' Spring profile (the
# RlsEnforceIntegrationTest and the human-gated prod cutover). NOT loaded by default, so the
# normal/test profiles remain dormant (app connects as owner, RLS bypassed).
#
# Flips enforcement on AND points Flyway at the OWNER role via spring.flyway.* — Boot then
# builds a dedicated Flyway datasource (decoupled from the app RoleRoutingDataSource), so
# migrations always run with full privileges regardless of the per-thread routing role.
spring:
  flyway:
    user: ${NEXUSPAY_DB_USER:nexuspay}
    password: ${NEXUSPAY_DB_PASSWORD:nexuspay_local}
    url: ${NEXUSPAY_DB_URL:jdbc:postgresql://localhost:5432/nexuspay}
    # C7: flip R__rls_force_owner.sql to FORCE the owner too. Safe ONLY together with the
    # role cutover below (app on nexuspay_app), never while the app still connects as owner —
    # that coupling is why rlsforce lives in THIS profile (which also sets rls.enforce=true), not
    # as an independently-settable flag. Re-trigger: with placeholderReplacement=true the rlsforce
    # value is part of the repeatable's checksum, so flipping it alone re-runs R__ at the next
    # migrate (no file bump needed) — see that file's header.
    placeholders:
      rlsforce: "true"
nexuspay:
  multi-tenancy:
    rls:
      enforce: true
