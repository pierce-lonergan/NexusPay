spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  # Flyway: intentionally NO `locations` override here. A profile-specific list
  # REPLACES (not merges) the base list, and the old hand-maintained 4-leaf list
  # (payment/ledger/iam/gateway) silently omitted the `app` leaf that defines
  # current_tenant_id(), so gateway's V3015 RLS policy failed once the V1 version
  # collision (which had been aborting the resolver first) was fixed. Inheriting
  # application.yml's full 11-leaf list keeps the integration-test schema identical
  # to production and is the single source of truth.
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Disable Keycloak JWT validation in tests
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:0/realms/nexuspay

  # No HashiCorp Vault server in integration tests. Nothing injects VaultTemplate
  # (the vault MODULE does its own card crypto); spring-cloud-starter-vault-config
  # is only for prod config sourcing. Without this, the Vault auto-config fails:
  # "Cannot create authentication mechanism for TOKEN" (no token available).
  cloud:
    vault:
      enabled: false

server:
  port: 0

nexuspay:
  hyperswitch:
    base-url: http://localhost:${wiremock.server.port:18080}
    api-key: test_api_key
    webhook-secret: test_webhook_secret
  dispute:
    # SEC-BATCH-2: known secret so the in-gate dispute webhook red-team test can
    # sign requests (HMAC-SHA512) and the fail-closed unsigned path rejects (401).
    # Mirrors the hyperswitch webhook-secret pattern above.
    webhook-secret: test_webhook_secret
  iam:
    refund-approval-threshold: 50000
  rate-limit:
    max-requests: 1000
    window-seconds: 60
  kafka:
    replication-factor: 1
    partitions: 1

resilience4j:
  circuitbreaker:
    instances:
      hyperswitch:
        failure-rate-threshold: 50
        sliding-window-size: 5
        wait-duration-in-open-state: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  # No PSP/Keycloak in integration tests — their downstream health probes would
  # connection-refuse and drag the aggregate /actuator/health to DOWN (503).
  health:
    hyperSwitch:
      enabled: false
    keycloak:
      enabled: false
    # FIX 5: the sanctions indicator is now ENABLED in tests. With no live OFAC feed,
    # ofacAvailable=false, but the static baseline is loaded so isScreeningAvailable()=true →
    # the indicator (and the readiness group) is UP at boot, so it no longer 503s the aggregate.
    # This keeps the readiness-grouping wiring (FIX 4) exercised under the full integration boot.
    sanctions:
      enabled: true
