global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 4h

receivers:
  - name: "default"
    # In production: configure Slack, PagerDuty, or email
    # For local dev: alerts are visible in Prometheus UI + AlertManager UI

  - name: "critical"
    # Production: PagerDuty integration
    # pagerduty_configs:
    #   - service_key: "<PAGERDUTY_KEY>"

  - name: "warning"
    # Production: Slack channel
    # slack_configs:
    #   - api_url: "<SLACK_WEBHOOK_URL>"
    #     channel: "#nexuspay-alerts"
