version: "3.9"

services:
  # ============================================================
  # HyperSwitch Payment Engine
  # ============================================================
  hyperswitch-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hyperswitch
      POSTGRES_PASSWORD: hyperswitch
      POSTGRES_DB: hyperswitch_db
    ports:
      - "5433:5432"
    volumes:
      - hyperswitch-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperswitch -d hyperswitch_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  hyperswitch-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hyperswitch-router:
    image: juspaydotin/hyperswitch-router:v1.120.0-standalone
    ports:
      - "8080:8080"
    environment:
      - ROUTER__SERVER__HOST=0.0.0.0
      - ROUTER__SERVER__PORT=8080
      - ROUTER__MASTER_DATABASE__HOST=hyperswitch-pg
      - ROUTER__MASTER_DATABASE__PORT=5432
      - ROUTER__MASTER_DATABASE__DBNAME=hyperswitch_db
      - ROUTER__MASTER_DATABASE__USERNAME=hyperswitch
      - ROUTER__MASTER_DATABASE__PASSWORD=hyperswitch
      - ROUTER__REDIS__HOST=hyperswitch-redis
      - ROUTER__REDIS__PORT=6379
      - ROUTER__SECRETS__ADMIN_API_KEY=${HYPERSWITCH_ADMIN_API_KEY:-admin_api_key}
      - ROUTER__SECRETS__JWT_SECRET=jwt_secret_for_dev
      - ROUTER__LOCKER__MOCK_LOCKER=true
      - ROUTER__LOG__CONSOLE__ENABLED=true
      - ROUTER__LOG__CONSOLE__LEVEL=INFO
    depends_on:
      hyperswitch-pg:
        condition: service_healthy
      hyperswitch-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # NexusPay Infrastructure
  # ============================================================
  nexuspay-pg:
    image: postgres:16-alpine
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=4
      -c max_replication_slots=4
    environment:
      POSTGRES_USER: ${NEXUSPAY_DB_USER:-nexuspay}
      POSTGRES_PASSWORD: ${NEXUSPAY_DB_PASSWORD:-nexuspay_local}
      POSTGRES_DB: nexuspay
    ports:
      - "5432:5432"
    volumes:
      - nexuspay-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuspay -d nexuspay"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # HashiCorp Vault — Secrets Management (Sprint 2.1)
  # ============================================================
  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: nexuspay-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: info
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ============================================================
  # Debezium CDC — Outbox Event Capture (Sprint 2.2)
  # ============================================================
  kafka-connect:
    image: debezium/connect:2.7
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: nexuspay-connect
      CONFIG_STORAGE_TOPIC: nexuspay.connect.configs
      OFFSET_STORAGE_TOPIC: nexuspay.connect.offsets
      STATUS_STORAGE_TOPIC: nexuspay.connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    depends_on:
      kafka:
        condition: service_healthy
      nexuspay-pg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # Temporal — Durable Workflow Execution (Sprint 2.2)
  # ============================================================
  temporal-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal_local
      POSTGRES_DB: temporal
    ports:
      - "5434:5432"
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal_local
      POSTGRES_SEEDS: temporal-pg
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig.yaml
    depends_on:
      temporal-pg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.31
    ports:
      - "8280:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  keycloak:
    image: keycloak/keycloak:26.1
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/nexuspay-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ============================================================
  # Observability Stack (Sprint 2.7)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./config/prometheus/slo_rules.yml:/etc/prometheus/slo_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hyperswitch-pg-data:
  nexuspay-pg-data:
  temporal-pg-data:
  prometheus-data:
  grafana-data:
