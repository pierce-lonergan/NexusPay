# docker/docker-compose.lite.yml
# ---------------------------------------------------------------------------
# NexusPay LITE local-dev stack (INT-8). Correct-by-derivation: every service
# below is copied VERBATIM (image/env/healthcheck/ports/command/volumes) from
# docker/docker-compose.yml -- the minimal subset for a TEST-mode sandbox
# (sk_test_ -> in-process mock -> canonical webhook).
#
# Excluded vs full (NOT needed for test mode): hyperswitch-*, temporal-*, vault,
# schema-registry*, kafka-connect, prometheus, grafana, alertmanager.
# The NexusPay app is NOT a compose service -- run it with `./gradlew :app:bootRun`
# (profile=local, SPRING_CLOUD_VAULT_ENABLED=false). See docs/LOCAL_DEV.md.
#
# Port templating: the full compose hard-codes host ports (5432, 9092, 6379,
# 8180, 29092). The `${..._PORT:-default}` wrappers below have DEFAULTS EQUAL to
# the full-compose values, so this file is behaviourally identical to the full
# compose's subset out of the box. To dodge a host-port collision, set the
# matching env var (e.g. KAFKA_HOST_PORT=39092) rather than a `-f` override file —
# a second compose file ADDS a ports entry (double-bind) instead of replacing it
# (see docs/LOCAL_DEV.md §8).
# ---------------------------------------------------------------------------
version: "3.9"

services:
  nexuspay-pg:
    image: postgres:16-alpine
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=4
      -c max_replication_slots=4
    environment:
      POSTGRES_USER: ${NEXUSPAY_DB_USER:-nexuspay}
      POSTGRES_PASSWORD: ${NEXUSPAY_DB_PASSWORD:-nexuspay_local}
      POSTGRES_DB: nexuspay
    ports:
      - "${NEXUSPAY_PG_PORT:-5432}:5432"
    volumes:
      - nexuspay-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuspay -d nexuspay"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.1
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/nexuspay-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  nexuspay-pg-data:
