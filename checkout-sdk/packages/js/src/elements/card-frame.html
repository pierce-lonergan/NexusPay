<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Card Input — NexusPay</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: var(--nxp-font-size-base, 16px); }

    body {
      font-family: var(--nxp-font-family, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      background: transparent;
      color: var(--nxp-color-text, #1A1A2E);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Form layout */
    .card-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: calc(var(--nxp-spacing-unit, 4px) * 3);
    }

    .card-form__number { grid-column: 1 / -1; }
    .card-form__expiry { grid-column: 1; }
    .card-form__cvc { grid-column: 2; }

    /* Field */
    .field { position: relative; }

    .field__label {
      display: block;
      margin-bottom: calc(var(--nxp-spacing-unit, 4px) * 1.5);
      font-size: 0.875rem;
      /* Seam parity: match the same-origin parent .Label (base-styles.ts) which
         uses the medium weight, not bold — so the label weight is identical. */
      font-weight: var(--nxp-font-weight-medium, 500);
      color: var(--nxp-color-text, #1A1A2E);
    }

    .field__input {
      width: 100%;
      padding: var(--nxp-space-3, calc(var(--nxp-spacing-unit, 4px) * 3));
      font-family: inherit;
      font-size: 1rem;
      font-weight: var(--nxp-font-weight-normal, 400);
      line-height: var(--nxp-font-line-height, 1.5);
      color: var(--nxp-color-text, #1A1A2E);
      background-color: var(--nxp-color-surface, var(--nxp-color-background, #FFFFFF));
      border: 1px solid var(--nxp-color-border, var(--nxp-border-default, #E5E7EB));
      border-radius: var(--nxp-border-radius, 8px);
      outline: none;
      transition:
        border-color var(--nxp-dur-fast, 150ms) var(--nxp-ease-standard, ease),
        box-shadow var(--nxp-dur-fast, 150ms) var(--nxp-ease-out, ease);
      -webkit-appearance: none;
      appearance: none;
    }

    .card-form__number .field__input { font-variant-numeric: tabular-nums; }

    .field__input::placeholder { color: var(--nxp-color-text-placeholder, #9CA3AF); }
    .field__input:hover { border-color: var(--nxp-color-border-hover, var(--nxp-border-hover, #D1D5DB)); }

    /* Two-layer focus ring — identical geometry to the parent so the seam is invisible. */
    .field__input:focus {
      border-color: var(--nxp-color-primary, #0066FF);
      box-shadow:
        0 0 0 1px var(--nxp-color-primary, #0066FF),
        0 0 0 var(--nxp-focus-ring-width, 3px) color-mix(in srgb, var(--nxp-color-primary, #0066FF) 18%, transparent);
    }

    .field__input--error { border-color: var(--nxp-color-danger, #DC2626); }

    .field__input--error:focus {
      box-shadow:
        0 0 0 1px var(--nxp-color-danger, #DC2626),
        0 0 0 var(--nxp-focus-ring-width, 3px) color-mix(in srgb, var(--nxp-color-danger, #DC2626) 18%, transparent);
    }

    /* Autofill */
    .field__input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px var(--nxp-color-surface, var(--nxp-color-background, #FFFFFF)) inset;
      -webkit-text-fill-color: var(--nxp-color-text, #1A1A2E);
    }

    /* Expiry row */
    .expiry-row {
      display: flex;
      align-items: center;
      gap: calc(var(--nxp-spacing-unit, 4px) * 1);
    }

    .expiry-row input { text-align: center; }
    .expiry-separator {
      font-size: 1.125rem;
      color: var(--nxp-color-text-placeholder, #9CA3AF);
      flex-shrink: 0;
    }

    /* Error */
    .field__error {
      display: none;
      margin-top: calc(var(--nxp-spacing-unit, 4px) * 1.5);
      font-size: 0.8125rem;
      color: var(--nxp-color-danger, #DC2626);
      animation: slide-in 200ms ease-out;
    }

    .field__error--visible { display: block; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Brand icon */
    .brand-icon {
      position: absolute;
      right: calc(var(--nxp-spacing-unit, 4px) * 3);
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 20px;
      pointer-events: none;
      transition:
        opacity var(--nxp-anim-brand-crossfade, 150ms) var(--nxp-ease-out, ease-out),
        transform var(--nxp-anim-brand-crossfade, 150ms) var(--nxp-ease-out, ease-out);
    }

    .brand-icon--hidden { opacity: 0; transform: translateY(-50%) scale(0.9); }
    .brand-icon svg { width: 100%; height: 100%; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { color: var(--nxp-color-text, #E2E8F0); }

      .field__label { color: var(--nxp-color-text, #E2E8F0); }

      .field__input {
        color: var(--nxp-color-text, #E2E8F0);
        background-color: var(--nxp-color-surface, var(--nxp-color-background, #1E293B));
        border-color: var(--nxp-color-border, var(--nxp-border-default, #334155));
      }

      .field__input:hover { border-color: var(--nxp-color-border-hover, var(--nxp-border-hover, #475569)); }
      .field__input::placeholder { color: var(--nxp-color-text-placeholder, #64748B); }

      .field__input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px var(--nxp-color-surface, var(--nxp-color-background, #1E293B)) inset;
        -webkit-text-fill-color: var(--nxp-color-text, #E2E8F0);
      }
    }

    /* RTL */
    [dir="rtl"] .field__input { text-align: right; }
    [dir="rtl"] .brand-icon { right: auto; left: calc(var(--nxp-spacing-unit, 4px) * 3); }

    /* Reduced motion (a11y): users who prefer reduced motion get no transitions
       or animations. Visual state still changes (focus ring, error message,
       brand icon) — only the motion is removed. */
    @media (prefers-reduced-motion: reduce) {
      .field__input,
      .brand-icon { transition: none; }
      .field__error { animation: none; }
    }

    /* Forced colors (Windows High Contrast): box-shadow rings are invisible, so
       fall back to a real outline using system colors — mirrors the parent. */
    @media (forced-colors: active) {
      .field__input { border: 1px solid CanvasText; }
      .field__input:focus { outline: 2px solid Highlight; outline-offset: var(--nxp-focus-outline-offset, 2px); }
      .field__input--error { border-color: LinkText; }
    }
  </style>
</head>
<body>
  <form class="card-form" autocomplete="on" novalidate role="group" aria-label="Card information">
    <div class="card-form__number field">
      <label class="field__label" for="card-number">Card number</label>
      <div style="position: relative;">
        <input
          id="card-number"
          class="field__input"
          type="text"
          inputmode="numeric"
          autocomplete="cc-number"
          placeholder="1234 1234 1234 1234"
          maxlength="23"
          aria-label="Card number"
          dir="auto"
        />
        <div id="brand-icon" class="brand-icon" aria-hidden="true"></div>
      </div>
      <div id="error-pan" class="field__error" role="alert" aria-live="polite"></div>
    </div>

    <div class="card-form__expiry field">
      <label class="field__label">Expiry</label>
      <div class="expiry-row">
        <input
          id="card-exp-month"
          class="field__input"
          type="text"
          inputmode="numeric"
          autocomplete="cc-exp-month"
          placeholder="MM"
          maxlength="2"
          aria-label="Expiry month"
          style="width: 3.5rem;"
        />
        <span class="expiry-separator">/</span>
        <input
          id="card-exp-year"
          class="field__input"
          type="text"
          inputmode="numeric"
          autocomplete="cc-exp-year"
          placeholder="YY"
          maxlength="2"
          aria-label="Expiry year"
          style="width: 3.5rem;"
        />
      </div>
      <div id="error-expiry" class="field__error" role="alert" aria-live="polite"></div>
    </div>

    <div class="card-form__cvc field">
      <label class="field__label" for="card-cvc">CVC</label>
      <input
        id="card-cvc"
        class="field__input"
        type="text"
        inputmode="numeric"
        autocomplete="cc-csc"
        placeholder="123"
        maxlength="4"
        aria-label="CVC"
      />
      <div id="error-cvc" class="field__error" role="alert" aria-live="polite"></div>
    </div>
  </form>

  <script type="module">
    // Card frame logic is bundled separately; in production it would be inlined.
    // For development, the card-frame.ts init function is called from the bundled script.

    // Inline minimal frame logic for standalone HTML operation:
    const BIN_PATTERNS = [
      { brand: 'visa', pattern: /^4/ },
      { brand: 'mastercard', pattern: /^(5[1-5]|2[2-7])/ },
      { brand: 'amex', pattern: /^3[47]/ },
      { brand: 'discover', pattern: /^(6011|65|64[4-9])/ },
      { brand: 'jcb', pattern: /^35(2[89]|[3-8])/ },
      { brand: 'diners', pattern: /^(30[0-5]|36|38)/ },
      { brand: 'unionpay', pattern: /^62/ },
      { brand: 'maestro', pattern: /^(5018|5020|5038|6304|6759|676[1-3])/ },
    ];

    function detectBrand(pan) {
      const digits = pan.replace(/\D/g, '');
      if (!digits) return 'unknown';
      for (const { brand, pattern } of BIN_PATTERNS) {
        if (pattern.test(digits)) return brand;
      }
      return 'unknown';
    }

    function luhnCheck(pan) {
      const digits = pan.replace(/\D/g, '');
      if (digits.length < 12) return false;
      let sum = 0;
      let alt = false;
      for (let i = digits.length - 1; i >= 0; i--) {
        let n = parseInt(digits[i], 10);
        if (alt) { n *= 2; if (n > 9) n -= 9; }
        sum += n;
        alt = !alt;
      }
      return sum % 10 === 0;
    }

    function isExpiryValid(month, year) {
      if (month < 1 || month > 12) return false;
      const now = new Date();
      const fullYear = 2000 + year;
      const expiry = new Date(fullYear, month, 0);
      return expiry >= new Date(now.getFullYear(), now.getMonth(), 1);
    }

    function formatPAN(digits) {
      const brand = detectBrand(digits);
      if (brand === 'amex') {
        return [digits.slice(0,4), digits.slice(4,10), digits.slice(10,15)].filter(Boolean).join(' ');
      }
      return digits.match(/.{1,4}/g)?.join(' ') || digits;
    }

    function cvcLen(brand) { return brand === 'amex' ? 4 : 3; }

    // Instructional error copy (state 2): incomplete vs invalid, never accusatory,
    // and only surfaced on BLUR so the field doesn't flash red mid-type.
    const MSG = {
      panIncomplete: 'Your card number is incomplete.',
      panInvalid: 'Your card number is invalid.',
      expiryIncomplete: "Your card's expiration date is incomplete.",
      expiryInvalidMonth: "Your card's expiration month is invalid.",
      expiryExpired: "Your card's expiration date is in the past.",
      cvcIncomplete: "Your card's security code is incomplete.",
    };

    // FIX 4: render a field's error state — text + visual error class AND the
    // programmatic aria-invalid so screen readers get the same state.
    function renderFieldError(input, errorEl, message) {
      if (input) {
        input.className = message ? 'field__input field__input--error' : 'field__input';
        input.setAttribute('aria-invalid', String(!!message));
      }
      if (errorEl) {
        errorEl.textContent = message || '';
        errorEl.className = message ? 'field__error field__error--visible' : 'field__error';
      }
    }

    // B-006 (race fix): the browser-ATTESTED origin of our immediate embedder,
    // read from window.location.ancestorOrigins (a DOMStringList on
    // Chromium/WebKit; index 0 is the immediate parent). It CANNOT be spoofed by
    // a co-resident frame, so when present it is the SOLE accepted parent origin
    // and closes the trust-on-first-use race where a hostile co-resident frame
    // (e.g. https://evil.example on the same merchant page) posts the handshake
    // before the real SDK and gets pinned. Returns "" when unavailable/empty
    // (Firefox / jsdom), in which case the legacy referrer-seeded TOFU applies.
    function deriveAuthoritativeParentOrigin() {
      try {
        const ancestors = window.location && window.location.ancestorOrigins;
        if (ancestors && ancestors.length > 0) return ancestors[0];
      } catch (e) { /* fall through */ }
      return '';
    }

    // B-006: best-effort origin of the embedding parent, used to target the
    // initial FRAME_READY before the parent hands us its exact origin in the
    // STYLE_UPDATE handshake. "" means "same origin as this document" — never a
    // wildcard.
    function deriveInitialParentOrigin() {
      try {
        if (document.referrer) return new URL(document.referrer).origin;
      } catch (e) { /* fall through */ }
      return '';
    }

    // B-006 (race fix): computed ONCE at init. When the browser attests the
    // immediate-parent origin it is the SOLE accepted origin and is pinned into
    // state.parentOrigin so the very first inbound message is validated against
    // the real parent — a co-resident attacker's first message is rejected even
    // if it wins the race. "" => no attestation (Firefox / jsdom) => legacy TOFU.
    const authoritativeParentOrigin = deriveAuthoritativeParentOrigin();

    const state = {
      pan: '', expMonth: '', expYear: '', cvc: '', brand: 'unknown',
      errors: { pan: null, expiry: null, cvc: null },
      apiBase: '', sessionToken: '',
      // Pin the attested parent immediately when known; otherwise seed from the
      // referrer for the initial FRAME_READY target and let TOFU pin later.
      parentOrigin: authoritativeParentOrigin || deriveInitialParentOrigin()
    };

    // B-006: post replies to the parent's EXACT origin, never "*". A wildcard
    // target would leak card metadata / tokenization results to any document
    // that currently occupies the parent frame.
    function post(type, payload) {
      window.parent.postMessage({ source: 'nexuspay-card-frame', type, payload }, state.parentOrigin || '');
    }

    // B-006 (hardened): only honor a parent message whose BROWSER-ATTESTED
    // event.origin matches the pinned parent origin. NO accept-all fallback:
    // the old `!state.parentOrigin` clause degraded to accept-any-origin when
    // the referrer was stripped, letting a hostile co-resident frame win the
    // handshake race and redirect the PAN. An empty origin ("") is tolerated
    // only under the jsdom test runtime; a real browser never reports a "jsdom"
    // UA, so the production gate fails closed on any unknown/foreign origin.
    function isTestOriginContext() {
      return typeof navigator !== 'undefined'
        && typeof navigator.userAgent === 'string'
        && navigator.userAgent.toLowerCase().includes('jsdom');
    }
    function isExpectedParentOrigin(origin) {
      // B-006 (race fix): when the browser attests the immediate-parent origin,
      // it is the SOLE accepted origin — NO trust-on-first-use, NO accept-all.
      // A co-resident attacker (event.origin = https://evil.example) is rejected
      // even if its handshake arrives first; state.parentOrigin was pinned to
      // this value at init so the first message is already validated.
      if (authoritativeParentOrigin) return origin === authoritativeParentOrigin;
      if (origin === '') return isTestOriginContext();
      if (!state.parentOrigin) return true; // TOFU (browser-attested), no attestation available
      return origin === state.parentOrigin;
    }

    function isComplete() {
      return luhnCheck(state.pan)
        && isExpiryValid(parseInt(state.expMonth), parseInt(state.expYear))
        && state.cvc.length === cvcLen(state.brand)
        && !state.errors.pan && !state.errors.expiry && !state.errors.cvc;
    }

    function emitChange() {
      post('CARD_CHANGE', {
        complete: isComplete(),
        empty: !state.pan && !state.expMonth && !state.expYear && !state.cvc,
        brand: state.brand,
        error: state.errors.pan || state.errors.expiry || state.errors.cvc,
        cardLastFour: state.pan.length >= 4 ? state.pan.slice(-4) : null,
      });
      if (isComplete()) post('CARD_COMPLETE');
    }

    // Number input
    const panInput = document.getElementById('card-number');
    const brandIcon = document.getElementById('brand-icon');
    const errorPan = document.getElementById('error-pan');
    const monthInput = document.getElementById('card-exp-month');
    const yearInput = document.getElementById('card-exp-year');
    const errorExpiry = document.getElementById('error-expiry');
    const cvcInput = document.getElementById('card-cvc');
    const errorCvc = document.getElementById('error-cvc');

    panInput.addEventListener('input', () => {
      const cursor = panInput.selectionStart || 0;
      const digitsBefore = panInput.value.slice(0, cursor).replace(/\D/g, '').length;
      const digits = panInput.value.replace(/\D/g, '');
      state.pan = digits;
      state.brand = detectBrand(digits);
      const formatted = formatPAN(digits);
      panInput.value = formatted;

      let nc = 0, ds = 0;
      for (let i = 0; i < formatted.length && ds < digitsBefore; i++) {
        nc = i + 1;
        if (formatted[i] !== ' ') ds++;
      }
      panInput.setSelectionRange(nc, nc);

      cvcInput.maxLength = cvcLen(state.brand);
      cvcInput.placeholder = state.brand === 'amex' ? '1234' : '123';

      // FIX 5: brand/Luhn run LIVE (brand icon + green success tick), but the RED
      // 'invalid' error is deferred to blur. Live, we only CLEAR a shown error once
      // the number becomes valid so a corrected number stops looking wrong.
      if (luhnCheck(digits)) {
        state.errors.pan = null;
        renderFieldError(panInput, errorPan, null);
      }
      emitChange();
    });

    // FIX 5: PAN red error is set on BLUR (incomplete vs invalid), not mid-type.
    panInput.addEventListener('blur', () => {
      const digits = state.pan;
      if (digits.length === 0) state.errors.pan = null;
      else if (luhnCheck(digits)) state.errors.pan = null;
      else if (digits.length >= 13) state.errors.pan = MSG.panInvalid;
      else state.errors.pan = MSG.panIncomplete;
      renderFieldError(panInput, errorPan, state.errors.pan);
      emitChange();
    });

    monthInput.addEventListener('input', () => {
      const d = monthInput.value.replace(/\D/g, '').slice(0, 2);
      monthInput.value = d;
      state.expMonth = d;
      // FIX 5: auto-advance + clear stale error only; red error deferred to blur.
      if (d.length === 2) {
        const m = parseInt(d, 10);
        if (m >= 1 && m <= 12) { state.errors.expiry = null; yearInput.focus(); }
      } else { state.errors.expiry = null; }
      if (!state.errors.expiry) {
        renderFieldError(monthInput, errorExpiry, null);
        renderFieldError(yearInput, errorExpiry, null);
      }
      emitChange();
    });

    yearInput.addEventListener('input', () => {
      const d = yearInput.value.replace(/\D/g, '').slice(0, 2);
      yearInput.value = d;
      state.expYear = d;
      // FIX 5: clear a stale error once a complete valid date is entered; red
      // 'expired' / 'invalid' errors are deferred to blur.
      if (d.length === 2 && state.expMonth.length === 2) {
        if (isExpiryValid(parseInt(state.expMonth), parseInt(d))) state.errors.expiry = null;
      }
      if (!state.errors.expiry) {
        renderFieldError(monthInput, errorExpiry, null);
        renderFieldError(yearInput, errorExpiry, null);
      }
      emitChange();
    });

    // FIX 5: expiry red error is set on BLUR (incomplete / invalid month / expired).
    function handleExpiryBlur() {
      const mLen = state.expMonth.length, yLen = state.expYear.length;
      if (mLen === 0 && yLen === 0) state.errors.expiry = null;
      else if (mLen < 2 || yLen < 2) state.errors.expiry = MSG.expiryIncomplete;
      else {
        const m = parseInt(state.expMonth), y = parseInt(state.expYear);
        if (m < 1 || m > 12) state.errors.expiry = MSG.expiryInvalidMonth;
        else if (!isExpiryValid(m, y)) state.errors.expiry = MSG.expiryExpired;
        else state.errors.expiry = null;
      }
      renderFieldError(monthInput, errorExpiry, state.errors.expiry);
      renderFieldError(yearInput, errorExpiry, state.errors.expiry);
      emitChange();
    }
    monthInput.addEventListener('blur', handleExpiryBlur);
    yearInput.addEventListener('blur', handleExpiryBlur);

    cvcInput.addEventListener('input', () => {
      const max = cvcLen(state.brand);
      const d = cvcInput.value.replace(/\D/g, '').slice(0, max);
      cvcInput.value = d;
      state.cvc = d;
      // Never show a CVC error while typing; clear any stale one.
      state.errors.cvc = null;
      renderFieldError(cvcInput, errorCvc, null);
      emitChange();
    });

    // CVC incomplete error is surfaced on blur (matches existing behavior).
    cvcInput.addEventListener('blur', () => {
      const max = cvcLen(state.brand);
      if (state.cvc.length === 0) state.errors.cvc = null;
      else if (state.cvc.length < max) state.errors.cvc = MSG.cvcIncomplete;
      else state.errors.cvc = null;
      renderFieldError(cvcInput, errorCvc, state.errors.cvc);
      emitChange();
    });

    // Parent messages
    window.addEventListener('message', async (event) => {
      if (!isExpectedParentOrigin(event.origin)) return;

      const data = event.data;
      if (!data || data.source !== 'nexuspay-parent') return;

      // Pin the parent origin to the BROWSER-ATTESTED event.origin on the first
      // accepted message. Never to a sender-declared payload value.
      if (!state.parentOrigin && event.origin) state.parentOrigin = event.origin;

      if (data.type === 'STYLE_UPDATE') {
        const p = data.payload || {};
        // Do NOT let the payload set/override the origin. If present it must
        // AGREE with the browser-attested event.origin, else drop the message.
        if (p.parentOrigin && event.origin && p.parentOrigin !== event.origin) return;
        if (p.sessionToken) state.sessionToken = p.sessionToken;
        if (p.apiBase) state.apiBase = p.apiBase;
        // TODO (spec P3 — deferred): appearance.fonts[] passthrough — inject
        // merchant custom @font-face into this iframe. Not yet implemented.
        if (p.appearance?.variables) {
          const vars = p.appearance.variables;
          const map = {
            colorPrimary: '--nxp-color-primary', colorBackground: '--nxp-color-background',
            colorText: '--nxp-color-text', colorDanger: '--nxp-color-danger',
            colorSuccess: '--nxp-color-success', fontFamily: '--nxp-font-family',
            fontSizeBase: '--nxp-font-size-base', borderRadius: '--nxp-border-radius',
            spacingUnit: '--nxp-spacing-unit', fontWeightNormal: '--nxp-font-weight-normal',
            fontWeightBold: '--nxp-font-weight-bold',
            // P2/P3: extended tokens so the iframe consumes the same set as the parent.
            colorTextSecondary: '--nxp-color-text-secondary',
            colorTextPlaceholder: '--nxp-color-text-placeholder',
            colorBorder: '--nxp-color-border', colorBorderHover: '--nxp-color-border-hover',
            colorWarning: '--nxp-color-warning', colorSurface: '--nxp-color-surface',
            onPrimary: '--nxp-on-primary', fontWeightMedium: '--nxp-font-weight-medium',
            buttonBorderRadius: '--nxp-button-border-radius',
          };
          for (const [k, v] of Object.entries(map)) {
            if (vars[k] !== undefined) document.documentElement.style.setProperty(v, String(vars[k]));
          }
        }
      } else if (data.type === 'TOKENIZE_REQUEST') {
        if (!isComplete()) {
          post('TOKENIZE_RESPONSE', { success: false, error: 'Card details are incomplete or invalid' });
          return;
        }
        try {
          const res = await fetch(`${state.apiBase}/v1/checkout/tokenize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.sessionToken}` },
            body: JSON.stringify({
              type: 'card', card_last_four: state.pan.slice(-4), card_brand: state.brand,
              card_exp_month: parseInt(state.expMonth), card_exp_year: 2000 + parseInt(state.expYear),
              token_data: btoa(state.pan),
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            post('TOKENIZE_RESPONSE', { success: false, error: err?.error?.message || `Failed (${res.status})` });
            return;
          }
          const d = await res.json();
          post('TOKENIZE_RESPONSE', { success: true, tokenId: d.id });
        } catch (e) {
          post('TOKENIZE_RESPONSE', { success: false, error: e.message || 'Network error' });
        }
      } else if (data.type === 'FOCUS_REQUEST') {
        panInput.focus();
      }
    });

    // FIX 6: observe content height and post a 'resize' to the parent (pinned
    // origin via post(), origin gate unchanged) so the iframe element is sized to
    // fit — no dead space, no clipping when the inline error slide-in grows the
    // body. Targets the established parent origin; does NOT weaken the gate.
    (function observeBodyResize() {
      if (typeof ResizeObserver === 'undefined') return;
      let last = -1;
      function emit() {
        const height = Math.ceil(document.body.scrollHeight);
        if (height > 0 && height !== last) { last = height; post('resize', { height }); }
      }
      new ResizeObserver(emit).observe(document.body);
      emit();
    })();

    // Ready
    post('FRAME_READY');
  </script>
</body>
</html>
